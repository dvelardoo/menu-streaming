<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Streaming</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Streaming">
  <meta name="theme-color" content="#0f0f12">

  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background: linear-gradient(180deg, #0b0b0e 0%, #14141a 100%);
      color:white;
      min-height:100vh;
      padding:24px 18px 40px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .app{
      width:100%;
      max-width:420px;
    }

    .top{
      margin-top:20px;
      margin-bottom:28px;
    }

    .badge{
      display:inline-block;
      font-size:12px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#ffb84d;
      background:rgba(255,184,77,.12);
      border:1px solid rgba(255,184,77,.18);
      padding:7px 10px;
      border-radius:999px;
      margin-bottom:14px;
    }

    h1{
      margin:0;
      font-size:34px;
      line-height:1.05;
      font-weight:800;
    }

    .sub{
      margin-top:10px;
      color:#b8b8c7;
      font-size:15px;
      line-height:1.5;
    }

    .grid{
      display:grid;
      gap:16px;
    }

    .card{
      position:relative;
      width:100%;
      border:none;
      border-radius:24px;
      padding:20px 18px;
      color:white;
      text-align:left;
      cursor:pointer;
      box-shadow:0 10px 30px rgba(0,0,0,.28);
      transition:transform .15s ease, opacity .15s ease;
    }

    .card:active{
      transform:scale(.98);
      opacity:.95;
    }

    .football{
      background:linear-gradient(135deg,#18a34a 0%, #0f7d37 100%);
    }

    .series{
      background:linear-gradient(135deg,#7c3aed 0%, #4f46e5 100%);
    }

    .icon{
      font-size:28px;
      margin-bottom:14px;
      display:block;
    }

    .title{
      font-size:24px;
      font-weight:800;
      margin-bottom:6px;
    }

    .desc{
      font-size:14px;
      color:rgba(255,255,255,.88);
      line-height:1.4;
      max-width:90%;
    }

    .arrow{
      position:absolute;
      right:18px;
      top:50%;
      transform:translateY(-50%);
      font-size:24px;
      opacity:.9;
    }

    .bottom{
      margin-top:24px;
      text-align:center;
      color:#8f90a6;
      font-size:12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="badge">STREAMING</div>
      <h1>Streaming</h1>
      <div class="sub">Elige qué quieres abrir.</div>
    </div>

    <div class="grid">
      <button class="card football" onclick="window.location.href='https://www.fctv33.one/es'">
        <span class="icon">⚽</span>
        <div class="title">Fútbol</div>
        <div class="desc">Acceso directo a tu web de partidos.</div>
        <div class="arrow">›</div>
      </button>

      <button class="card series" onclick="window.location.href='https://series.ly/'">
        <span class="icon">🎬</span>
        <div class="title">Series y pelis</div>
        <div class="desc">Abre tu web de series y películas.</div>
        <div class="arrow">›</div>
      </button>
    </div>

    <div class="bottom"></div>
  </div>
</body>
</html>
